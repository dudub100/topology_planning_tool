<!DOCTYPE html>
<html>
<head>
    <title>Radio Network Planner: Modified Prim's Algorithm</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; font-family: Arial, sans-serif; height: 100vh; width: 100vw; display: flex; overflow: hidden; }
        #sidebar { width: 350px; height: 100vh; background: #f8f9fa; padding: 20px; box-sizing: border-box; overflow-y: auto; border-right: 1px solid #ccc; flex-shrink: 0; }
        #map { width: calc(100vw - 350px); height: 100vh; flex-grow: 1; z-index: 1; }
        h2 { font-size: 18px; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="number"], textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        textarea { height: 150px; font-family: monospace; resize: vertical; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        .note { font-size: 12px; color: #666; margin-bottom: 10px; }
        #results { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 4px; display: none; }
        #status { font-weight: bold; color: #d9534f; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Network Parameters</h2>
    
    <div class="form-group">
        <label>Angle Threshold (Degrees)</label>
        <input type="number" id="angleThreshold" value="90" min="0" max="180">
    </div>
    
    <div class="form-group">
        <label>Node Height (Meters)</label>
        <input type="number" id="nodeHeight" value="30" min="0">
    </div>

    <div class="form-group">
        <label>POP Node Index (0-based)</label>
        <input type="number" id="popIndex" value="0" min="0">
        <div class="note">First node added is index 0.</div>
    </div>

    <div class="form-group">
        <label>Node Coordinates (Lat, Lng)</label>
        <textarea id="nodeList" placeholder="32.178, 34.907&#10;32.180, 34.910"></textarea>
        <div class="note">Click map to add, or type here and click 'Update Map'.</div>
    </div>

    <button onclick="syncMapFromList()">Update Map from List</button>
    <button id="runBtn" onclick="runPlanningTool()">Run Planning Tool</button>
    
    <div id="status"></div>

    <div id="results">
        <h3>Results</h3>
        <p><strong>Total Distance:</strong> <span id="resDistance">0</span> km</p>
        <p><strong>Violations (< Threshold):</strong> <span id="resViolations">0</span></p>
    </div>
</div>

<div id="map"></div>

<script>
    // Initialize Map
    const map = L.map('map').setView([32.0853, 34.7818], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    let nodes = [];
    let markers = [];
    let polylines = [];

    // Map Click Handler
    map.on('click', function(e) {
        nodes.push({ lat: e.latlng.lat, lng: e.latlng.lng });
        updateUI();
    });

    function updateUI() {
        // Sync Textarea
        const textarea = document.getElementById('nodeList');
        textarea.value = nodes.map(n => `${n.lat.toFixed(5)}, ${n.lng.toFixed(5)}`).join('\n');
        
        // Update Markers
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        
        const popIdx = parseInt(document.getElementById('popIndex').value) || 0;
        
        nodes.forEach((node, i) => {
            const isPop = i === popIdx;
            const color = isPop ? 'red' : 'blue';
            const marker = L.circleMarker([node.lat, node.lng], {
                color: color, fillColor: color, fillOpacity: 0.8, radius: isPop ? 8 : 5
            }).addTo(map).bindPopup(`Node ${i} ${isPop ? '(POP)' : ''}`);
            markers.push(marker);
        });
    }

    function syncMapFromList() {
        const text = document.getElementById('nodeList').value;
        const lines = text.split('\n');
        nodes = [];
        lines.forEach(line => {
            const parts = line.split(',');
            if(parts.length === 2) {
                const lat = parseFloat(parts[0].trim());
                const lng = parseFloat(parts[1].trim());
                if(!isNaN(lat) && !isNaN(lng)) {
                    nodes.push({lat, lng});
                }
            }
        });
        updateUI();
        
        // Auto-center map to the first node if it exists
        if(nodes.length > 0) {
            map.setView([nodes[0].lat, nodes[0].lng], 13);
        }
    }

    // --- Math & GIS Helpers ---
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const p = Math.PI / 180;
        const a = 0.5 - Math.cos((lat2 - lat1) * p)/2 + 
                  Math.cos(lat1 * p) * Math.cos(lat2 * p) * (1 - Math.cos((lon2 - lon1) * p))/2;
        return 2 * R * Math.asin(Math.sqrt(a));
    }

    function getBearing(lat1, lon1, lat2, lon2) {
        const p = Math.PI / 180;
        const y = Math.sin((lon2 - lon1) * p) * Math.cos(lat2 * p);
        const x = Math.cos(lat1 * p) * Math.sin(lat2 * p) -
                  Math.sin(lat1 * p) * Math.cos(lat2 * p) * Math.cos((lon2 - lon1) * p);
        let brng = Math.atan2(y, x) * (180 / Math.PI);
        return (brng + 360) % 360;
    }

    function getAngleDifference(b1, b2) {
        let diff = Math.abs(b1 - b2);
        if (diff > 180) diff = 360 - diff;
        return diff;
    }

    // --- Line of Sight via OpenTopoData ---
    async function checkLineOfSight(nodeA, nodeB, height) {
        const locations = `${nodeA.lat},${nodeA.lng}|${nodeB.lat},${nodeB.lng}`;
        const url = `https://api.opentopodata.org/v1/srtm90m?locations=${locations}&samples=10`;
        
        try {
            const response = await fetch(url);
            if(response.status === 429) {
                throw new Error("Rate limit hit");
            }
            const data = await response.json();
            if(!data.results || data.results.length < 10) return true;

            const hA = data.results[0].elevation + height;
            const hB = data.results[9].elevation + height;
            
            for(let i = 1; i < 9; i++) {
                const expectedLineElevation = hA + ((hB - hA) * (i / 9));
                const actualGround = data.results[i].elevation;
                if(actualGround > expectedLineElevation) {
                    return false; 
                }
            }
            return true;
        } catch (e) {
            console.warn("LoS check failed/rate limited. Assuming Clear LoS.", e);
            return true; 
        }
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // --- Main Planning Algorithm ---
    async function runPlanningTool() {
        if(nodes.length < 2) return alert("Add at least 2 nodes.");
        
        const popIdx = parseInt(document.getElementById('popIndex').value);
        if(isNaN(popIdx) || popIdx < 0 || popIdx >= nodes.length) return alert("Invalid POP Index.");

        const threshold = parseFloat(document.getElementById('angleThreshold').value);
        const height = parseFloat(document.getElementById('nodeHeight').value);
        const statusEl = document.getElementById('status');
        const btn = document.getElementById('runBtn');

        btn.disabled = true;
        
        let edges = [];
        let totalChecks = (nodes.length * (nodes.length - 1)) / 2;
        let checked = 0;

        statusEl.innerText = `Fetching Elevation Profiles (0/${totalChecks}) - Please wait 1 sec per link...`;

        for(let i = 0; i < nodes.length; i++) {
            for(let j = i + 1; j < nodes.length; j++) {
                await sleep(1100); 
                let hasLoS = await checkLineOfSight(nodes[i], nodes[j], height);
                checked++;
                statusEl.innerText = `Fetching Elevation Profiles (${checked}/${totalChecks})...`;
                
                if(hasLoS) {
                    let dist = getDistance(nodes[i].lat, nodes[i].lng, nodes[j].lat, nodes[j].lng);
                    let bearingIJ = getBearing(nodes[i].lat, nodes[i].lng, nodes[j].lat, nodes[j].lng);
                    let bearingJI = getBearing(nodes[j].lat, nodes[j].lng, nodes[i].lat, nodes[i].lat);
                    
                    edges.push({ u: i, v: j, dist: dist, bUV: bearingIJ, bVU: bearingJI });
                    edges.push({ u: j, v: i, dist: dist, bUV: bearingJI, bVU: bearingIJ });
                }
            }
        }

        statusEl.innerText = "Running Modified Prim's Algorithm...";
        await sleep(500); 

        let inTree = new Set([popIdx]);
        let treeEdges = [];
        let nodeBearings = Array(nodes.length).fill().map(() => []); 
        let angleViolations = 0;
        let totalDistance = 0;
        const PENALTY_MULTIPLIER = 10;

        while(inTree.size < nodes.length) {
            let bestEdge = null;
            let minCost = Infinity;
            let edgeAngleViolates = false;

            for(let edge of edges) {
                if(inTree.has(edge.u) && !inTree.has(edge.v)) {
                    let localMinAngle = 180;
                    for(let existingBearing of nodeBearings[edge.u]) {
                        let ang = getAngleDifference(edge.bUV, existingBearing);
                        if(ang < localMinAngle) localMinAngle = ang;
                    }

                    let cost = edge.dist;
                    let violates = localMinAngle < threshold;
                    
                    if(violates) {
                        cost *= PENALTY_MULTIPLIER;
                    }

                    if(cost < minCost) {
                        minCost = cost;
                        bestEdge = edge;
                        edgeAngleViolates = violates;
                    }
                }
            }

            if(!bestEdge) {
                statusEl.innerText = "Error: Network is disconnected (LoS blocked).";
                btn.disabled = false;
                return;
            }

            inTree.add(bestEdge.v);
            treeEdges.push(bestEdge);
            totalDistance += bestEdge.dist;
            if(edgeAngleViolates) angleViolations++;

            nodeBearings[bestEdge.u].push(bestEdge.bUV);
            nodeBearings[bestEdge.v].push(bestEdge.bVU);
        }

        polylines.forEach(p => map.removeLayer(p));
        polylines = [];

        treeEdges.forEach(edge => {
            let violates = false;
            let othersU = nodeBearings[edge.u].filter(b => b !== edge.bUV);
            for(let b of othersU) { if(getAngleDifference(b, edge.bUV) < threshold) violates = true; }

            const color = violates ? 'red' : 'green';
            const weight = violates ? 4 : 3;
            
            const line = L.polyline([
                [nodes[edge.u].lat, nodes[edge.u].lng], 
                [nodes[edge.v].lat, nodes[edge.v].lng]
            ], {color: color, weight: weight}).addTo(map);
            polylines.push(line);
        });

        document.getElementById('resDistance').innerText = totalDistance.toFixed(2);
        document.getElementById('resViolations').innerText = angleViolations;
        document.getElementById('results').style.display = 'block';
        statusEl.innerText = "Complete!";
        btn.disabled = false;
    }
</script>

</body>
</html>
